<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What If Love — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .hero-wrap {
      padding: 8rem 0 5rem;
      max-width: 820px;
      will-change: opacity, transform;
      transition: opacity 0.15s ease, transform 0.25s ease;
    }
    .line-1 {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.45;
      color: #111;
    }
    .line-2 {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.45;
      color: #111;
      margin-top: 1.5rem;
    }
    .line-2-cir,
    .line-2-reveal {
      display: inline;
      clip-path: inset(0 100% 0 0);
      transition: clip-path 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .line-2-cir.in,
    .line-2-reveal.in { clip-path: inset(0 0 0 0); }
    .soft-break { display: inline; }
    @media (min-width: 500px) {
      .soft-break { display: block; }
    }
  </style>
</head>
<body>
  <div class="hero-wrap" id="heroWrap">
    <span class="line-1" id="line1">
      In the age of AI, love is the intelligence <span class="soft-break">we've forgotten how to scale.</span>
    </span>
    <span class="line-2" id="line2">
      <strong class="line-2-cir" id="line2Cir">Co-Intelligence Readiness</strong><span class="line-2-reveal" id="line2Reveal"> enables those who care to become those who can.</span>
    </span>
  </div>
  <script>
    /* ─── height relay ─────────────────────────────────────────── */
    function sendHeight() {
      window.parent.postMessage({ type: 'X-resize', height: document.body.scrollHeight }, '*');
    }
    /* ─── reveal ───────────────────────────────────────────────── */
    function runReveal() {
      setTimeout(function () {
        document.getElementById('line2Cir').classList.add('in');
      }, 250);
      setTimeout(function () {
        document.getElementById('line2Reveal').classList.add('in');
      }, 950);
      setTimeout(sendHeight, 1400);
    }
    sendHeight();
    document.fonts.ready.then(function () { sendHeight(); runReveal(); });
    window.addEventListener('resize', sendHeight);
    /* ─── scroll fade ──────────────────────────────────────────────
       Observing document.body fires IO from the very top edge of the
       iframe the moment scroll starts, rather than waiting for heroWrap
       bounds to exit. Range 0.60 spreads the fade across enough IO
       firings to avoid a single-step snap.
    ─────────────────────────────────────────────────────────────── */
    var hero = document.getElementById('heroWrap');
    var thresholds = Array.from({ length: 101 }, function (_, i) { return i / 100; });
    new IntersectionObserver(function (entries) {
      var ratio = entries[0].intersectionRatio;
      var t = Math.max(0, Math.min(1, (.85 - ratio) / 0.20));
      hero.style.opacity   = String(1 - t);
      hero.style.transform = 'translateY(' + (-t * 20) + 'px)';
    }, { threshold: thresholds }).observe(document.body);
  </script>
</body>
</html>
