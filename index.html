<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What If Love — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .hero-wrap {
      padding: 3rem 0;
      max-width: 820px;
      will-change: opacity, transform;
    }

    .line-1 {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.45;
      color: #111;
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    .line-2 {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.45;
      color: #111;
      margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.0s ease, transform 1.0s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .line-1.in { opacity: 1; }
    .line-2.in { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="hero-wrap" id="heroWrap">
    <span class="line-1" id="line1">
      In the age of AI, love is the intelligence we've forgotten how to scale.
    </span>
    <span class="line-2" id="line2">
      <strong>Co-Intelligence Readiness</strong> enables those who care to become those who can.
    </span>
  </div>

  <script>
    /* ─── height relay ─────────────────────────────────────────────── */
    function sendHeight() {
      var h = document.body.scrollHeight;
      window.parent.postMessage({ type: 'X-resize', height: h }, '*');
    }

    /* ─── reveal animation ─────────────────────────────────────────── */
    function runReveal() {
      document.getElementById('line1').classList.add('in');
      setTimeout(function () {
        document.getElementById('line2').classList.add('in');
        setTimeout(sendHeight, 1100);
      }, 600);
    }

    sendHeight();
    document.fonts.ready.then(function () {
      sendHeight();
      runReveal();
    });
    window.addEventListener('resize', sendHeight);

    /* ─── scroll fade ──────────────────────────────────────────────────
       Fade begins after BUFFER px of scroll past the iframe top,
       completes over RANGE px. Subtle upward drift accompanies the fade.

       Two execution paths:
         1. Same-origin: window.frameElement gives direct DOM access.
            Works automatically—no parent script needed.
         2. Cross-origin (GitHub Pages ↔ WordPress):
            Listens for { type: 'hero-scroll-pos', px: Number } messages
            and signals readiness with { type: 'hero-needs-scroll' }.
            Requires the parent snippet below.

       WordPress parent snippet (paste into a Custom HTML block
       near or after the hero iframe on the WordPress page):

       <script>
         (function () {
           var frame = null;
           window.addEventListener('message', function (e) {
             if (e.data && e.data.type === 'hero-needs-scroll') {
               frame = e.source;
               var raf = null;
               window.addEventListener('scroll', function () {
                 if (raf) return;
                 raf = requestAnimationFrame(function () {
                   raf = null;
                   var iframes = document.querySelectorAll('iframe');
                   iframes.forEach(function (f) {
                     try {
                       f.contentWindow.postMessage({
                         type: 'hero-scroll-pos',
                         px: -f.getBoundingClientRect().top
                       }, '*');
                     } catch (err) {}
                   });
                 });
               }, { passive: true });
             }
           });
         }());
       <\/script>
    ──────────────────────────────────────────────────────────────── */
    (function () {
      var hero  = document.getElementById('heroWrap');
      var BUFFER = 30;
      var RANGE  = 180;
      var rafId  = null;

      function applyFade(pxOut) {
        var t = Math.max(0, Math.min(1, (pxOut - BUFFER) / RANGE));
        hero.style.opacity   = String(1 - t);
        hero.style.transform = 'translateY(' + (-t * 20) + 'px)';
      }

      /* path 1: same-origin */
      try {
        var fe = window.frameElement;
        if (fe) {
          fe.ownerDocument.addEventListener('scroll', function () {
            if (rafId) return;
            rafId = requestAnimationFrame(function () {
              rafId = null;
              applyFade(-fe.getBoundingClientRect().top);
            });
          }, { passive: true });
          return;
        }
      } catch (e) { /* cross-origin—fall through */ }

      /* path 2: cross-origin postMessage relay */
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'hero-scroll-pos') {
          applyFade(e.data.px);
        }
      });

      try { window.parent.postMessage({ type: 'hero-needs-scroll' }, '*'); } catch (e) {}
    }());
  </script>
</body>
</html>
