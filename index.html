<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What If Love — Hero</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/hauora-sans@5/400.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/hauora-sans@5/700.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Hauora Sans', sans-serif;
    }

    .hero-wrap {
      padding: 3rem 0;
      max-width: 820px;
    }

    .hero-line {
      font-size: clamp(1.45rem, 3.2vw, 2rem);
      line-height: 1.45;
      color: #111;
      display: block;
    }

    .hero-line.line-1 {
      font-weight: 700;
    }

    .hero-line.line-2 {
      font-weight: 400;
      margin-top: 0.6rem;
    }

    .phrase {
      display: inline;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .phrase.in {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="hero-wrap">
    <span class="hero-line line-1">
      <span class="phrase" id="p3">In the age of AI, </span><span class="phrase" id="p1">love is the intelligence </span><span class="phrase" id="p4">we've forgotten how to scale.</span>
    </span>
    <span class="hero-line line-2">
      <span class="phrase" id="p5">We build tools </span><span class="phrase" id="p2">for those who care enough to lead.</span>
    </span>
  </div>

  <script>
    const delays = { p1: 0, p2: 130, p3: 260, p4: 390, p5: 520 };

    function sendHeight() {
      const h = document.body.scrollHeight;
      window.parent.postMessage({ iframeHeight: h }, '*');
    }

    function runReveal() {
      Object.entries(delays).forEach(([id, ms]) => {
        setTimeout(() => {
          document.getElementById(id).classList.add('in');
        }, ms);
      });
      setTimeout(sendHeight, 600);
    }

    window.addEventListener('load', () => {
      sendHeight();
      runReveal();
    });

    window.addEventListener('resize', sendHeight);
  </script>
</body>
</html>
