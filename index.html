<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What If Love — Hero</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Hauora Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .hero-wrap {
      padding: 3rem 0;
      max-width: 820px;
    }

    .line-1 {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.45;
      color: #111;
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    .line-2 {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.45;
      color: #111;
      margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.0s ease, transform 1.0s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .line-1.in {
      opacity: 1;
    }

    .line-2.in {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="hero-wrap">
    <span class="line-1" id="line1">
      In the age of AI, love is the intelligence we've forgotten how to scale.
    </span>
    <span class="line-2" id="line2">
      <strong>WHAT IF LOVE</strong> enables those who care, to become those who can.
    </span>
  </div>

  <script>
    function sendHeight() {
      const h = document.body.scrollHeight;
      window.parent.postMessage({ type: 'X-resize', height: h }, '*');
    }

    function runReveal() {
      document.getElementById('line1').classList.add('in');
      setTimeout(function () {
        document.getElementById('line2').classList.add('in');
        setTimeout(sendHeight, 1100);
      }, 600);
    }

    sendHeight();

    document.fonts.ready.then(function () {
      sendHeight();
      runReveal();
    });

    window.addEventListener('resize', sendHeight);
  </script>
</body>
</html>
