<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What If Love — Hero</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/hauora-sans@5/400.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/hauora-sans@5/700.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Hauora Sans', sans-serif;
    }

    .hero-wrap {
      padding: 3rem 0;
      max-width: 820px;
    }

    .line-1 {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.45;
      color: #111;
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    .line-2 {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.45;
      color: #111;
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 1.8s ease;
    }

    .in {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="hero-wrap">
    <span class="line-1" id="line1">
      In the age of AI, love is the intelligence we've forgotten how to scale.
    </span>
    <span class="line-2" id="line2">
      <strong>WHAT IF LOVE</strong> enables those who care, to become those who can.
    </span>
  </div>

  <script>
    function sendHeight() {
      const h = document.body.scrollHeight;
      window.parent.postMessage({ iframeHeight: h }, '*');
    }

    function runReveal() {
      document.getElementById('line1').classList.add('in');
      document.getElementById('line2').classList.add('in');
      setTimeout(sendHeight, 2100);
    }

    window.addEventListener('load', () => {
      sendHeight();
      runReveal();
    });

    window.addEventListener('resize', sendHeight);
  </script>
</body>
</html>
